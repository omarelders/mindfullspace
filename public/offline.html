<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindful Space - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #18181b;
        color: #f4f4f5;
        font-family: "Segoe UI", sans-serif;
      }

      .card {
        width: min(560px, 92vw);
        background: #27272a;
        border: 1px solid #3f3f46;
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #d4d4d8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Mindful Space can still open cached content. Reconnect to sync the latest updates.</p>
    </main>
  </body>
</html>
